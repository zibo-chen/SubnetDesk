name: SubnetDesk Installers CI

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
    - "docs/**"
    - "README.md"
    - ".github/workflows/ci.yml"
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "README.md"
      - ".github/workflows/ci.yml"

concurrency:
  group: subnetdesk-flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-ci:
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: true
      publish-release: false
      build-mobile: false
