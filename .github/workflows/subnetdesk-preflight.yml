name: SubnetDesk Preflight

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: subnetdesk-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-gates:
    name: LAN-only, branding, and generated assets
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Check LAN-only residuals
        run: bash scripts/check_lan_only_residuals.sh

      - name: Check SubnetDesk branding and icons
        run: bash scripts/check_subnetdesk_branding.sh

      - name: Check installer artifact contract
        run: |
          grep -Fq 'upload-artifact: true' .github/workflows/flutter-ci.yml
          grep -Fq 'publish-release: false' .github/workflows/flutter-ci.yml
          grep -Fq 'publish-release: true' .github/workflows/flutter-ci.yml
          grep -Fq 'upload-tag: "nightly"' .github/workflows/flutter-ci.yml
          grep -Fq 'build-mobile: false' .github/workflows/flutter-ci.yml
          grep -Fq 'publish-release: true' .github/workflows/flutter-tag.yml
          grep -Fq 'publish-release: true' .github/workflows/flutter-nightly.yml
          grep -Fq 'flutter build linux --release --target-platform linux-arm64' .github/workflows/flutter-build.yml
          grep -Fq 'dartsdk-linux-arm64-release.zip' .github/workflows/flutter-build.yml
          grep -Fq 'rm -f flutter/bin/cache/flutter_tools.snapshot flutter/bin/cache/flutter_tools.stamp' .github/workflows/flutter-build.yml
          grep -Fq 'flutter precache --linux --force' .github/workflows/flutter-build.yml
          ! grep -Fq 'flutter-elinux' .github/workflows/flutter-build.yml
          sed -n '/^  build-for-windows-flutter:/,/^  build-for-windows-sciter:/p' .github/workflows/flutter-build.yml | grep -Fq 'toolchain: ${{ env.RUST_VERSION }}'
          ! sed -n '/^  build-for-windows-flutter:/,/^  build-for-windows-sciter:/p' .github/workflows/flutter-build.yml | grep -Fq 'toolchain: ${{ env.SCITER_RUST_VERSION }}'
          for artifact in \
            'name: subnetdesk-windows-' \
            'name: subnetdesk-macos-' \
            'name: subnetdesk-linux-rpm-' \
            'name: subnetdesk-archlinux-' \
            'name: subnetdesk-appimage-' \
            'name: subnetdesk-flatpak-'
          do
            grep -Fq "$artifact" .github/workflows/flutter-build.yml
          done

      - name: Check release upload retry contract
        run: bash scripts/check_release_upload_retry.sh

      - name: Check Python scripts
        run: python3 -m py_compile build.py scripts/generate_subnetdesk_icons.py

      - name: Check workflow syntax
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.{yml,yaml}"].each { |path| YAML.parse_file(path) }'
